<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <title>Rhytm</title>

    <!-- ВИДАЛИТИ!!! -->
    <meta name="google" content="notranslate">
</head>

<body>
    <div class="wrapper">
        <header class="header">
            <div class="header__container">
                <div class="header__logo"><img src="img/logo.svg" alt="logo"></div>
                <nav class="header__menu menu">
                    <ul class="menu__list">
                        <li class="menu__item"><a href="#" class="menu__link">Store</a></li>
                        <li class="menu__item"><a href="#" class="menu__link">Collections</a></li>
                        <li class="menu__item"><a href="#" class="menu__link">Support</a></li>
                    </ul>
                </nav>
                    <button type="button" aria-label="Open menu" class="menu__icon"><span></span></button>
            </div>
        </header>
        <main class="page">
            <section class="page__main main">
                <div class="main__container">
                    <div class="main__content content-main">
                        <div class="content-main__body">
                            <h1 class="content-main__title">Browse top quality <span>Guitars</span> online</h1>
                            <p class="content-main__subtitle">
                                Explore 50k+ latest collections of branded guitars online with Rhythm.
                            </p>
                            <div class="content-main__items">
                                <a href="#" class="content-main__button">Get the App</a>
                                <div class="content-main__icons">
                                    <img src="img/main/icon-google.svg" alt="google play" class="content-main__icon">
                                    <img src="img/main/icon-apple.svg" alt="apple store" class="content-main__icon">
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="main__decor decor-main">
                        <div class="decor-main__image">
                            <img src="img/main/decor.jpg" alt="guitars and amps">
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="js/script.js"></script>
</body>

</html>
